<div class="dashboard-container">

  <!-- Main Classic Navbar -->
  <header class="classic-navbar">
    <div class="logo-section">
      <i class="fas fa-heart logo-heart"></i>
      <span class="logo-text">SoulStory</span>
    </div>

    <!-- Navigation buttons -->
    <nav class="nav-links">
      <button class="nav-btn" routerLink="/inicio-adulto-mayor">
        <i class="fas fa-home"></i> {{ 'NAV.INICIO' | translate }}
      </button>
      <button class="nav-btn" routerLink="/ver-recuerdos">
        <i class="fas fa-memory"></i> {{ 'NAV.RECUERDOS' | translate }}
      </button>
      <button class="nav-btn" routerLink="/galeria-ia">
        <i class="fas fa-image"></i> {{ 'NAV.GALERIA' | translate }}
      </button>
    </nav>

    <!-- User Profile (Wrapped as a Clickable Button) & Logout -->
    <div class="profile-logout-section">
      <button class="profile-btn" routerLink="/perfil-adulto-mayor" [title]="'NAV.PERFIL' | translate">
        <div class="user-profile">
          <div class="avatar-circle" style="overflow: hidden; display: flex; align-items: center; justify-content: center;">
            @if (fotoPerfil) {
              <img [src]="fotoPerfil" style="width: 100%; height: 100%; object-fit: cover;" alt="Foto de perfil">
            } @else {
              <i class="fas fa-user"></i>
            }
          </div>
          <div class="profile-text">
            <span class="profile-name">{{ nombreUsuario }}</span>
            <span class="profile-role">{{ 'NAV.ROL' | translate }}</span>
          </div>
        </div>
      </button>

      <button class="btn-logout-square" (click)="cerrarSesion()" [title]="'NAV.CERRAR_SESION' | translate">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </header>

  <div class="container">
    <div class="glass-panel main-panel animate-fade-in">
      <div class="panel-header">
        <button mat-button class="btn btn-retroceder" routerLink="/inicio-adulto-mayor">
          <i class="fas fa-arrow-left"></i> {{ 'BOTON.VOLVER' | translate }}
        </button>
        <h2 class="panel-title">
          <i class="fas fa-pen-fancy text-purple"></i> {{ 'REC_TEXTO.TITULO' | translate }}
        </h2>
      </div>

      <p class="panel-intro">{{ 'REC_TEXTO.INTRO' | translate }}</p>

      <form (ngSubmit)="guardarRecuerdo()" class="senior-form">
        <div class="form-group">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>{{ 'REC_TEXTO.LABEL_TITULO' | translate }}</mat-label>
            <input matInput type="text" id="titulo-texto" name="tituloRecuerdo" required
                   [placeholder]="'REC_TEXTO.PLACEHOLDER_TITULO' | translate"
                   [(ngModel)]="nuevoRecuerdo.tituloRecuerdo">
          </mat-form-field>
        </div>

        <div class="form-group">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>{{ 'REC_TEXTO.LABEL_RELATO' | translate }}</mat-label>
            <textarea matInput id="contenido-texto" name="contenido" required rows="8"
                      [placeholder]="'REC_TEXTO.PLACEHOLDER_RELATO' | translate"
                      [(ngModel)]="nuevoRecuerdo.contenido"></textarea>
          </mat-form-field>
        </div>

        <button type="submit" mat-flat-button class="btn btn-save bg-purple-btn" [disabled]="cargando">
          <i class="fas fa-save"></i> {{ 'REC_TEXTO.BOTON_SAVE' | translate }}
        </button>
      </form>
    </div>
  </div>
</div>
