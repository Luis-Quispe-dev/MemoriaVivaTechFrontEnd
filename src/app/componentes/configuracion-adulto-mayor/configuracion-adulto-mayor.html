<div class="dashboard-container">
  <header class="classic-navbar">
    <div class="logo-section">
      <i class="fas fa-heart logo-heart"></i>
      <span class="logo-text">SoulStory</span>
    </div>

    <nav class="nav-links">
      <button class="nav-btn" routerLink="/inicio-adulto-mayor">
        <i class="fas fa-home"></i> {{ 'NAV.INICIO' | translate }}
      </button>
      <button class="nav-btn" routerLink="/ver-recuerdos">
        <i class="fas fa-memory"></i> {{ 'NAV.RECUERDOS' | translate }}
      </button>
      <button class="nav-btn" routerLink="/galeria-ia">
        <i class="fas fa-image"></i> {{ 'NAV.GALERIA' | translate }}
      </button>
    </nav>

    <div class="profile-logout-section">
      <button class="bell-btn" [title]="'CONF.NOTIF' | translate" style="background: white; border: 1px solid #cbd5e1; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 1.15rem; transition: all 0.2s ease;">
        <i class="fas fa-bell"></i>
      </button>

      <button class="profile-btn" routerLink="/perfil-adulto-mayor" [title]="'NAV.PERFIL' | translate" style="background: transparent; border: none; padding: 6px 14px; border-radius: 16px; cursor: pointer; display: flex; align-items: center;">
        <div class="user-profile" style="display: flex; align-items: center; gap: 10px;">
          <div class="avatar-circle" style="width: 48px; height: 48px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 1.4rem; border: 1px solid #cbd5e1; overflow: hidden;">
            @if (fotoPerfil) {
              <img [src]="fotoPerfil" style="width: 100%; height: 100%; object-fit: cover;" [alt]="'NAV.PERFIL' | translate">
            } @else {
              <i class="fas fa-user"></i>
            }
          </div>
          <div class="profile-text" style="display: flex; flex-direction: column; text-align: left;">
            <span class="profile-name" style="font-size: 1.15rem; font-weight: 700; color: #0f172a;">{{ nombreUsuario }}</span>
            <span class="profile-role" style="font-size: 0.85rem; color: #64748b; font-weight: 600;">{{ 'NAV.ROL' | translate }}</span>
          </div>
        </div>
      </button>

      <button class="btn-logout-square" (click)="cerrarSesion()" [title]="'NAV.CERRAR_SESION' | translate">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </header>

  <div class="config-container animate-fade-in">
    <div class="config-title-container">
      <h1 class="config-title">{{ 'CONF.TITULO' | translate }}</h1>
    </div>

    <!-- Centered Card -->
    <div class="config-card">
      <div class="settings-grid">
        <!-- Interfaz Language -->
        <label class="config-label">{{ 'CONF.IDIOMA' | translate }}</label>
        <select class="custom-select" [(ngModel)]="configuracion.idioma">
          <option value="Español">Español</option>
          <option value="Inglés">Inglés</option>
          <option value="Portugués">Portugués</option>
          <option value="Japonés">日本語 (Japonés)</option>
          <option value="Francés">Français (Francés)</option>
          <option value="Italiano">Italiano (Italiano)</option>
        </select>

        <!-- Text Size -->
        <label class="config-label">{{ 'CONF.TAMANIO' | translate }}</label>
        <select class="custom-select" [(ngModel)]="configuracion.tamanioFuente">
          <option value="Normal">{{ 'CONF.FUENTE_NORMAL' | translate }}</option>
          <option value="Grande">{{ 'CONF.FUENTE_GRANDE' | translate }}</option>
          <option value="Gigante">{{ 'CONF.FUENTE_GIGANTE' | translate }}</option>
        </select>

        <label class="config-label">{{ 'CONF.TEMA' | translate }}</label>
        <select class="custom-select" [(ngModel)]="configuracion.temaVisual">
          <option value="Claro">{{ 'CONF.TEMA_CLARO' | translate }}</option>
          <option value="Oscuro">{{ 'CONF.TEMA_OSCURO' | translate }}</option>
          <option value="Alto Contraste">{{ 'CONF.TEMA_CONTRASTE' | translate }}</option>
        </select>

        <label class="config-label">{{ 'CONF.NOTIF' | translate }}</label>
        <select class="custom-select" [ngModel]="configuracion.notificacionesSonido ? 'Activadas' : 'Desactivadas'" (ngModelChange)="configuracion.notificacionesSonido = ($event === 'Activadas')">
          <option value="Activadas">{{ 'CONF.ACTIVADAS' | translate }}</option>
          <option value="Desactivadas">{{ 'CONF.DESACTIVADAS' | translate }}</option>
        </select>
      </div>

      <div class="button-container">
        <button type="button" class="save-btn" (click)="guardarCambios()">{{ 'CONF.GUARDAR' | translate }}</button>
      </div>
    </div>
  </div>
</div>
